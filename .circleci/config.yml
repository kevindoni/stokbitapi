version: 2.1

jobs:
  test:
    docker:
      - image: cimg/node:22.11
    environment:
      PUPPETEER_SKIP_DOWNLOAD: "true"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
    working_directory: ~/project
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-npm-deps-{{ checksum "package-lock.json" }}
            - v1-npm-deps-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: v1-npm-deps-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Run smoke tests (CI mode)
          command: CI=true npm test

  deploy-render:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Trigger Render deploy (optional)
          command: |
            if [ -z "$RENDER_DEPLOY_HOOK" ]; then
              echo "RENDER_DEPLOY_HOOK is not set. Skipping deploy step."
              exit 0
            fi

            echo "Triggering Render deployment..."
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
            echo "Render deploy triggered successfully."

workflows:
  ci:
    jobs:
      - test
      - deploy-render:
          requires:
            - test
          filters:
            branches:
              only: main
